/*<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>TypeScript Quiz</title>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
          --bg: #f5f4f0;
          --card: #ffffff;
          --text: #1a1a1a;
          --muted: #888;
          --border: #e0dfd9;
          --purple: #5b4fcf;
          --purple-light: #eeecfb;
          --purple-dark: #3d35a0;
          --green: #2d7a4f;
          --green-light: #e8f5ee;
          --red: #c0392b;
          --red-light: #fdecea;
          --radius: 12px;
          --radius-sm: 8px;
        }

        body {
          font-family: 'Syne', sans-serif;
          background: var(--bg);
          color: var(--text);
          min-height: 100vh;
          display: flex;
          align-items: flex-start;
          justify-content: center;
          padding: 2rem 1rem;
        }

        .container {
          width: 100%;
          max-width: 640px;
        }

        /* Header */
        .header {
          display: flex;
          align-items: center;
          justify-content: space-between;
          margin-bottom: 2rem;
        }

        .logo {
          font-size: 15px;
          font-weight: 700;
          letter-spacing: 0.08em;
          color: var(--purple);
          text-transform: uppercase;
        }

        .header-score {
          font-family: 'DM Mono', monospace;
          font-size: 13px;
          color: var(--muted);
          background: white;
          border: 1px solid var(--border);
          border-radius: 20px;
          padding: 4px 14px;
        }

        /* Progress */
        .progress-wrap { margin-bottom: 1.5rem; }

        .progress-meta {
          display: flex;
          justify-content: space-between;
          font-size: 12px;
          font-weight: 600;
          letter-spacing: 0.06em;
          text-transform: uppercase;
          color: var(--muted);
          margin-bottom: 8px;
        }

        .progress-track {
          height: 5px;
          background: var(--border);
          border-radius: 10px;
          overflow: hidden;
        }

        .progress-fill {
          height: 100%;
          background: var(--purple);
          border-radius: 10px;
          transition: width 0.5s cubic-bezier(0.4,0,0.2,1);
        }

        /* Question card */
        .card {
          background: var(--card);
          border: 1px solid var(--border);
          border-radius: var(--radius);
          padding: 2rem;
          margin-bottom: 1rem;
          animation: fadeUp 0.3s ease;
        }

        @keyframes fadeUp {
          from { opacity: 0; transform: translateY(10px); }
          to   { opacity: 1; transform: translateY(0); }
        }

        .question-num {
          font-family: 'DM Mono', monospace;
          font-size: 11px;
          font-weight: 500;
          letter-spacing: 0.1em;
          text-transform: uppercase;
          color: var(--purple);
          margin-bottom: 10px;
        }

        .question-text {
          font-size: 18px;
          font-weight: 600;
          line-height: 1.45;
          color: var(--text);
          margin-bottom: 1.5rem;
        }

        /* Options */
        .options { display: flex; flex-direction: column; gap: 8px; }

        .option {
          display: flex;
          align-items: center;
          gap: 12px;
          padding: 13px 16px;
          border: 1px solid var(--border);
          border-radius: var(--radius-sm);
          cursor: pointer;
          transition: border-color 0.15s, background 0.15s, transform 0.1s;
          user-select: none;
        }

        .option:hover:not(.locked) {
          border-color: var(--purple);
          background: var(--purple-light);
          transform: translateX(2px);
        }

        .option.selected {
          border-color: var(--purple);
          background: var(--purple-light);
        }

        .option.correct {
          border-color: var(--green);
          background: var(--green-light);
        }

        .option.wrong {
          border-color: var(--red);
          background: var(--red-light);
        }

        .option.reveal {
          border-color: var(--green);
          background: var(--green-light);
        }

        .option.locked { cursor: default; }

        .opt-badge {
          width: 30px;
          height: 30px;
          border-radius: 50%;
          background: var(--bg);
          border: 1px solid var(--border);
          display: flex;
          align-items: center;
          justify-content: center;
          font-family: 'DM Mono', monospace;
          font-size: 12px;
          font-weight: 500;
          color: var(--muted);
          flex-shrink: 0;
          transition: background 0.15s, color 0.15s, border-color 0.15s;
        }

        .option.selected .opt-badge { background: var(--purple); color: #fff; border-color: var(--purple); }
        .option.correct .opt-badge  { background: var(--green);  color: #fff; border-color: var(--green); }
        .option.wrong .opt-badge    { background: var(--red);    color: #fff; border-color: var(--red); }
        .option.reveal .opt-badge   { background: var(--green);  color: #fff; border-color: var(--green); }

        .opt-text {
          font-size: 14px;
          font-weight: 500;
          color: var(--text);
        }

        .option.correct .opt-text { color: var(--green); }
        .option.wrong .opt-text   { color: var(--red); }
        .option.reveal .opt-text  { color: var(--green); }

        /* Feedback */
        .feedback {
          margin-top: 1rem;
          font-size: 13px;
          font-weight: 600;
          min-height: 20px;
          display: flex;
          align-items: center;
          gap: 6px;
        }
        .feedback.ok  { color: var(--green); }
        .feedback.bad { color: var(--red); }

        /* Icon check / cross */
        .icon { width: 16px; height: 16px; flex-shrink: 0; }

        /* Next button */
        .btn-row { display: flex; justify-content: flex-end; }

        .btn {
          padding: 11px 24px;
          border-radius: var(--radius-sm);
          font-family: 'Syne', sans-serif;
          font-size: 14px;
          font-weight: 700;
          letter-spacing: 0.03em;
          cursor: pointer;
          border: none;
          transition: background 0.15s, transform 0.1s;
        }

        .btn:active { transform: scale(0.97); }

        .btn-primary {
          background: var(--purple);
          color: #fff;
        }
        .btn-primary:hover { background: var(--purple-dark); }
        .btn-primary:disabled { background: var(--border); color: var(--muted); cursor: not-allowed; transform: none; }

        .btn-outline {
          background: white;
          color: var(--text);
          border: 1px solid var(--border);
        }
        .btn-outline:hover { background: var(--bg); }

        /* Results */
        .results-card {
          background: var(--card);
          border: 1px solid var(--border);
          border-radius: var(--radius);
          padding: 2.5rem 2rem;
          animation: fadeUp 0.4s ease;
        }

        .result-top { text-align: center; margin-bottom: 2rem; }

        .score-ring {
          width: 110px;
          height: 110px;
          border-radius: 50%;
          background: var(--purple-light);
          border: 3px solid var(--purple);
          display: flex;
          flex-direction: column;
          align-items: center;
          justify-content: center;
          margin: 0 auto 1.25rem;
        }

        .score-big {
          font-family: 'DM Mono', monospace;
          font-size: 30px;
          font-weight: 500;
          color: var(--purple-dark);
          line-height: 1;
        }

        .score-pct {
          font-size: 12px;
          font-weight: 600;
          color: var(--purple);
          margin-top: 3px;
          letter-spacing: 0.05em;
        }

        .result-title { font-size: 20px; font-weight: 700; margin-bottom: 6px; }
        .result-sub   { font-size: 14px; color: var(--muted); margin-bottom: 1.5rem; }

        .stats-row {
          display: flex;
          gap: 10px;
          justify-content: center;
          margin-bottom: 2rem;
        }

        .stat {
          background: var(--bg);
          border-radius: var(--radius-sm);
          padding: 10px 20px;
          text-align: center;
        }

        .stat-num { font-family: 'DM Mono', monospace; font-size: 20px; font-weight: 500; }
        .stat-num.g { color: var(--green); }
        .stat-num.r { color: var(--red); }
        .stat-label { font-size: 11px; text-transform: uppercase; letter-spacing: 0.07em; color: var(--muted); margin-top: 2px; }

        .missed-section { text-align: left; }

        .missed-title {
          font-size: 11px;
          font-weight: 700;
          letter-spacing: 0.08em;
          text-transform: uppercase;
          color: var(--muted);
          margin-bottom: 12px;
          padding-bottom: 8px;
          border-bottom: 1px solid var(--border);
        }

        .missed-item {
          padding: 12px 0;
          border-bottom: 1px solid var(--border);
        }
        .missed-item:last-child { border-bottom: none; }

        .missed-q { font-size: 13px; font-weight: 600; color: var(--text); margin-bottom: 5px; }
        .missed-answers { display: flex; gap: 16px; font-size: 12px; flex-wrap: wrap; }
        .missed-wrong { color: var(--red); }
        .missed-right { color: var(--green); font-weight: 600; }

        .results-btn-row { display: flex; gap: 10px; justify-content: center; margin-bottom: 1.5rem; }
    </style>
</head>
<body>
<div class="container">

    <div class="header">
        <div class="logo">TS Quiz</div>
        <div class="header-score" id="header-score">Score: 0</div>
    </div>

    <div id="app"></div>

</div>

<script>
    const questions = [
      { q: "What does 'TS' stand for in TypeScript?", opts: ["Type System","TypeScript","Typed Script","Text Style"], ans: 1 },
      { q: "Which company developed TypeScript?", opts: ["Google","Meta","Microsoft","Apple"], ans: 2 },
      { q: "What is the file extension for TypeScript files?", opts: [".js",".tsx",".ts",".tp"], ans: 2 },
      { q: "Which keyword declares a constant in TypeScript?", opts: ["var","let","const","fixed"], ans: 2 },
      { q: "What does TypeScript compile to?", opts: ["Python","Java","Binary","JavaScript"], ans: 3 },
      { q: "Which of these is NOT a primitive type in TypeScript?", opts: ["string","boolean","array","number"], ans: 2 },
      { q: "What type does TypeScript infer for: const x = 42?", opts: ["any","object","number","integer"], ans: 2 },
      { q: "What does the 'any' type do in TypeScript?", opts: ["Throws an error","Disables type checking for that value","Makes the value null","Converts to string"], ans: 1 },
      { q: "What symbol is used to define a union type?", opts: ["&","|","+","~"], ans: 1 },
      { q: "What does 'unknown' mean in TypeScript?", opts: ["Same as any","The variable does not exist","A type-safe version of any","An error type"], ans: 2 },
      { q: "How do you declare a return type on a function?", opts: ["function f() -> string","function f(): string","function f() => string","function f() as string"], ans: 1 },
      { q: "What return type means a function returns nothing?", opts: ["null","empty","void","undefined"], ans: 2 },
      { q: "What is a 'generic' in TypeScript?", opts: ["A type that works with any value in a type-safe way","A function with no parameters","A built-in utility type","A default export"], ans: 0 },
      { q: "What keyword implements an interface in a class?", opts: ["extends","implements","uses","inherits"], ans: 1 },
      { q: "What does the 'readonly' keyword do?", opts: ["Makes a property optional","Prevents a property from being changed after assignment","Hides a property from other classes","Makes it available globally"], ans: 1 },
      { q: "What does the '?' symbol mean on an interface property?", opts: ["The property is private","The property is optional","The property is a boolean","The property can be null only"], ans: 1 },
      { q: "What is the difference between 'interface' and 'type'?", opts: ["They are exactly the same","type can use unions, interface can be extended/merged","interface is faster","type only works with primitives"], ans: 1 },
      { q: "What is an enum in TypeScript?", opts: ["A function that enumerates arrays","A list of named constants","A loop construct","A generic constraint"], ans: 1 },
      { q: "What does 'strict: true' do in tsconfig.json?", opts: ["Makes the compiler faster","Enables all strict type-checking options","Disables JavaScript interop","Forces all types to be any"], ans: 1 },
      { q: "What is 'type inference' in TypeScript?", opts: ["Manually writing out all types","TypeScript guessing types automatically from values","Converting JS to TS","A runtime type check"], ans: 1 },
    ];

    const letters = ['A','B','C','D'];
    let current = 0, score = 0, answered = false, results = [];

    const app = document.getElementById('app');
    const headerScore = document.getElementById('header-score');

    function render() {
      if (current >= questions.length) { renderResults(); return; }
      const q = questions[current];
      const pct = Math.round((current / questions.length) * 100);
      const isLast = current === questions.length - 1;

      app.innerHTML = `
        <div class="progress-wrap">
          <div class="progress-meta">
            <span>Progress</span>
            <span>${current + 1} / ${questions.length}</span>
          </div>
          <div class="progress-track">
            <div class="progress-fill" style="width:${pct}%"></div>
          </div>
        </div>

        <div class="card">
          <div class="question-num">Question ${current + 1}</div>
          <div class="question-text">${q.q}</div>
          <div class="options">
            ${q.opts.map((opt, i) => `
              <div class="option" id="opt-${i}" onclick="pick(${i})">
                <div class="opt-badge">${letters[i]}</div>
                <div class="opt-text">${opt}</div>
              </div>
            `).join('')}
          </div>
          <div class="feedback" id="feedback"></div>
        </div>

        <div class="btn-row">
          <button class="btn btn-primary" id="btn-next" onclick="next()" disabled>
            ${isLast ? 'See results' : 'Next question'} &rarr;
          </button>
        </div>
      `;
    }

    function pick(i) {
      if (answered) return;
      answered = true;
      const q = questions[current];
      const correct = i === q.ans;
      if (correct) score++;
      results.push({ q: q.q, correct, chosen: q.opts[i], expected: q.opts[q.ans] });
      headerScore.textContent = `Score: ${score}`;

      q.opts.forEach((_, idx) => {
        const el = document.getElementById('opt-' + idx);
        el.classList.add('locked');
        if (idx === i && correct)  el.classList.add('correct');
        if (idx === i && !correct) el.classList.add('wrong');
        if (idx === q.ans && !correct) el.classList.add('reveal');
      });

      const fb = document.getElementById('feedback');
      if (correct) {
        fb.className = 'feedback ok';
        fb.innerHTML = `<svg class="icon" viewBox="0 0 16 16" fill="none"><circle cx="8" cy="8" r="7" stroke="#2d7a4f" stroke-width="1.5"/><path d="M5 8l2 2 4-4" stroke="#2d7a4f" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg> Correct!`;
      } else {
        fb.className = 'feedback bad';
        fb.innerHTML = `<svg class="icon" viewBox="0 0 16 16" fill="none"><circle cx="8" cy="8" r="7" stroke="#c0392b" stroke-width="1.5"/><path d="M5.5 5.5l5 5M10.5 5.5l-5 5" stroke="#c0392b" stroke-width="1.5" stroke-linecap="round"/></svg> Wrong — the correct answer is highlighted above.`;
      }

      document.getElementById('btn-next').disabled = false;
    }

    function next() {
      if (!answered) return;
      current++;
      answered = false;
      render();
    }

    function renderResults() {
      const total = questions.length;
      const pct = Math.round((score / total) * 100);
      const wrong = total - score;
      let title = '', sub = '';
      if (pct === 100) { title = 'Perfect score!'; sub = 'You are a TypeScript master. Incredible work!'; }
      else if (pct >= 80) { title = 'Excellent work!'; sub = 'Almost perfect — you clearly know your TypeScript!'; }
      else if (pct >= 60) { title = 'Good job!'; sub = 'Solid effort. Review the missed questions to level up.'; }
      else { title = 'Keep learning!'; sub = 'TypeScript takes practice. Review the answers below and try again.'; }

      const missed = results.filter(r => !r.correct);

      app.innerHTML = `
        <div class="results-card">
          <div class="result-top">
            <div class="score-ring">
              <div class="score-big">${score}/${total}</div>
              <div class="score-pct">${pct}%</div>
            </div>
            <div class="result-title">${title}</div>
            <div class="result-sub">${sub}</div>

            <div class="stats-row">
              <div class="stat">
                <div class="stat-num g">${score}</div>
                <div class="stat-label">Correct</div>
              </div>
              <div class="stat">
                <div class="stat-num r">${wrong}</div>
                <div class="stat-label">Wrong</div>
              </div>
              <div class="stat">
                <div class="stat-num">${pct}%</div>
                <div class="stat-label">Score</div>
              </div>
            </div>
          </div>

          <div class="results-btn-row">
            <button class="btn btn-primary" onclick="restart()">Try again &rarr;</button>
          </div>

          ${missed.length > 0 ? `
            <div class="missed-section">
              <div class="missed-title">Questions you missed (${missed.length})</div>
              ${missed.map((r, i) => `
                <div class="missed-item">
                  <div class="missed-q">${i + 1}. ${r.q}</div>
                  <div class="missed-answers">
                    <span class="missed-wrong">&#10007; You: ${r.chosen}</span>
                    <span class="missed-right">&#10003; Correct: ${r.expected}</span>
                  </div>
                </div>
              `).join('')}
            </div>
          ` : '<div style="text-align:center;font-size:14px;color:#2d7a4f;font-weight:600;">You got every question right!</div>'}
        </div>
      `;
    }

    function restart() {
      current = 0; score = 0; answered = false; results = [];
      headerScore.textContent = 'Score: 0';
      render();
    }

    render();
</script>
</body>
</html */
